services:
  - type: web
    name: realtime-dashboard-backend
    runtime: python
    rootDir: back
    buildCommand: bash build.sh
    startCommand: daphne -b 0.0.0.0 -p $PORT config.asgi:application
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DJANGO_SECRET_KEY
        sync: false
      - key: DJANGO_DEBUG
        value: "false"
      - key: ENVIRONMENT
        value: production
      - key: DJANGO_ALLOWED_HOSTS
        value: 127.0.0.1,localhost,.onrender.com,mpmtrading.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: http://localhost:3000,http://127.0.0.1:3000,https://mpmtrading.netlify.app
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: http://localhost:3000,http://127.0.0.1:3000,https://mpmtrading.netlify.app
      - key: WS_ALLOWED_ORIGINS
        value: http://localhost:3000,http://127.0.0.1:3000,https://mpmtrading.netlify.app
      - key: REDIS_URL
        sync: false
      - key: MARKET_STREAM_AUTOSTART
        value: "true"
      - key: MARKET_STREAM_INTERVAL_MS
        value: "1500"
      - key: PYTHON_VERSION
        value: 3.13.3
      - key: LOG_LEVEL
        value: INFO
